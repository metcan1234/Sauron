<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sauron">
  <defs>
    <linearGradient id="rim-closed" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6d1b00" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="#ff6f00" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#fff176"/>
      <stop offset="75%" stop-color="#ff6f00" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6d1b00" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="slit-line" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="15%" stop-color="#ff6f00"/>
      <stop offset="50%" stop-color="#fffde7"/>
      <stop offset="85%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#1a0500"/>
    </linearGradient>
    <filter id="blur-closed" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
    <filter id="glow-closed" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="32" cy="32" rx="28" ry="18" fill="#ff6f00" opacity="0.08" filter="url(#blur-closed)"/>

  <path d="M6 32c6.5-13.5 15-19.5 26-19.5s19.5 6 26 19.5c-6.5 13.5-15 19.5-26 19.5S12.5 45.5 6 32z" fill="none" stroke="url(#rim-closed)" stroke-width="2" filter="url(#glow-closed)"/>

  <path d="M8 30 Q14 18 22 24" fill="none" stroke="#ffb300" stroke-width="1.6" stroke-linecap="round" opacity="0.55" filter="url(#glow-closed)"/>
  <path d="M56 30 Q50 18 42 24" fill="none" stroke="#ffb300" stroke-width="1.6" stroke-linecap="round" opacity="0.55" filter="url(#glow-closed)"/>
  <path d="M8 34 Q14 46 22 40" fill="none" stroke="#ff6f00" stroke-width="1.4" stroke-linecap="round" opacity="0.45" filter="url(#glow-closed)"/>
  <path d="M56 34 Q50 46 42 40" fill="none" stroke="#ff6f00" stroke-width="1.4" stroke-linecap="round" opacity="0.45" filter="url(#glow-closed)"/>

  <path d="M9 32h46" stroke="#ff3d00" stroke-width="5" stroke-linecap="round" opacity="0.2" filter="url(#blur-closed)"/>
  <path d="M10 32h44" stroke="url(#slit-line)" stroke-width="2.8" stroke-linecap="round" filter="url(#glow-closed)"/>
  <path d="M14 32h36" stroke="#fffde7" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>

  <circle cx="17" cy="21" r="0.55" fill="#ffd54f" opacity="0.6" filter="url(#glow-closed)"/>
  <circle cx="49" cy="20" r="0.45" fill="#ffab40" opacity="0.55" filter="url(#glow-closed)"/>
