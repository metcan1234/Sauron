<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sauron">
  <defs>
    <radialGradient id="inferno" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="12%" stop-color="#fff176"/>
      <stop offset="28%" stop-color="#ffb300"/>
      <stop offset="48%" stop-color="#ff6f00"/>
      <stop offset="72%" stop-color="#d84315"/>
      <stop offset="90%" stop-color="#6d1b00"/>
      <stop offset="100%" stop-color="#1a0500"/>
    </radialGradient>
    <radialGradient id="white-hot" cx="50%" cy="42%" r="22%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#fff59d"/>
      <stop offset="100%" stop-color="#ff9100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="slit-aura" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#ff5722" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#bf360c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff6f00" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffab40" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#fff8e1" stop-opacity="0.95"/>
      <stop offset="80%" stop-color="#ffab40" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6f00" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-md" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
    <filter id="blur-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
    <filter id="glow-merge" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="turbulence" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08 0.14" numOctaves="3" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="eye-clip">
      <path d="M6 32c6.5-13.5 15-19.5 26-19.5s19.5 6 26 19.5c-6.5 13.5-15 19.5-26 19.5S12.5 45.5 6 32z"/>
    </clipPath>
  </defs>

  <!-- ambient halos -->
  <ellipse cx="32" cy="32" rx="30" ry="20" fill="#ff6f00" opacity="0.14" filter="url(#blur-lg)"/>
  <ellipse cx="32" cy="32" rx="24" ry="15" fill="#ffab00" opacity="0.1" filter="url(#blur-md)"/>

  <!-- wispy outer smoke / flame dissipation -->
  <g opacity="0.55" filter="url(#blur-md)">
    <path d="M6 32 Q2 28 4 24 Q8 26 6 32" fill="#ff6f00"/>
    <path d="M58 32 Q62 28 60 24 Q56 26 58 32" fill="#ff6f00"/>
    <path d="M32 11 Q28 8 26 12 Q30 14 32 11" fill="#ffb300"/>
    <path d="M32 11 Q36 8 38 12 Q34 14 32 11" fill="#ffb300"/>
    <path d="M32 53 Q28 56 26 52 Q30 50 32 53" fill="#e65100"/>
    <path d="M32 53 Q36 56 38 52 Q34 50 32 53" fill="#e65100"/>
  </g>

  <g clip-path="url(#eye-clip)">
    <!-- base fire mass -->
    <ellipse cx="32" cy="32" rx="27" ry="17" fill="#1a0500"/>
    <ellipse cx="32" cy="32" rx="27" ry="17" fill="url(#inferno)" filter="url(#turbulence)"/>
    <ellipse cx="32" cy="30" rx="27" ry="17" fill="url(#white-hot)" filter="url(#blur-sm)"/>

    <!-- swirling flame ribbons -->
    <g filter="url(#glow-merge)" opacity="0.75">
      <path d="M32 32 Q18 18 10 28 Q16 34 24 32 Q14 38 12 32 Q20 24 32 32" fill="#ff9100" opacity="0.55"/>
      <path d="M32 32 Q46 18 54 28 Q48 34 40 32 Q50 38 52 32 Q44 24 32 32" fill="#ff9100" opacity="0.55"/>
      <path d="M32 32 Q22 42 14 36 Q20 30 28 32 Q16 26 18 32 Q26 38 32 32" fill="#ff6f00" opacity="0.5"/>
      <path d="M32 32 Q42 42 50 36 Q44 30 36 32 Q48 26 46 32 Q38 38 32 32" fill="#ff6f00" opacity="0.5"/>
    </g>

    <!-- inner turbulent streaks -->
    <g fill="none" stroke-linecap="round" filter="url(#blur-sm)">
      <path d="M32 16 Q24 24 32 32 Q40 24 32 16" stroke="#fff9c4" stroke-width="1.4" opacity="0.55"/>
      <path d="M32 48 Q24 40 32 32 Q40 40 32 48" stroke="#ffab40" stroke-width="1.2" opacity="0.5"/>
      <path d="M14 32 Q22 26 32 32 Q42 26 50 32" stroke="#ffe082" stroke-width="1" opacity="0.45"/>
      <path d="M16 28 Q26 34 32 28 Q38 34 48 28" stroke="#ff8f00" stroke-width="0.9" opacity="0.4"/>
      <path d="M16 36 Q26 30 32 36 Q38 30 48 36" stroke="#ff8f00" stroke-width="0.9" opacity="0.4"/>
      <path d="M32 20 Q28 28 32 32 Q36 28 32 20" stroke="#ffffff" stroke-width="0.7" opacity="0.35"/>
      <path d="M32 44 Q28 36 32 32 Q36 36 32 44" stroke="#ff6f00" stroke-width="0.8" opacity="0.35"/>
    </g>

    <!-- pupil aura -->
    <ellipse cx="32" cy="32" rx="5.5" ry="15" fill="url(#slit-aura)" filter="url(#blur-md)"/>

    <!-- vertical slit — organic cat-eye shape -->
    <path d="M32 15.5
             C34.8 22 35.2 27 32 32
             C28.8 27 29.2 22 32 15.5 Z" fill="#030303" filter="url(#blur-sm)"/>
    <path d="M32 16.5
             C33.6 22.5 33.8 27 32 32
             C30.2 27 30.4 22.5 32 16.5 Z" fill="#000000"/>
    <path d="M32 17 C33.2 23 33.3 27.5 32 32 C30.7 27.5 30.8 23 32 17 Z" fill="none" stroke="#ff3d00" stroke-width="0.35" opacity="0.6"/>

    <!-- pupil highlights -->
    <ellipse cx="33.6" cy="23" rx="0.7" ry="2.4" fill="#fffde7" opacity="0.7"/>
    <ellipse cx="31" cy="39" rx="0.45" ry="1.2" fill="#ff6f00" opacity="0.4"/>
  </g>

  <!-- luminous inner rim trace -->
  <path d="M8 32c5.5-12 13.5-17.5 24-17.5s18.5 5.5 24 17.5c-5.5 12 13.5 17.5-24 17.5S13.5 44 8 32z" fill="none" stroke="url(#edge-glow)" stroke-width="1.8" filter="url(#glow-merge)"/>

  <!-- outer flame licks -->
  <g filter="url(#glow-merge)">
    <path d="M8 30 Q14 18 22 24 Q16 28 8 30" fill="none" stroke="#ffb300" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <path d="M56 30 Q50 18 42 24 Q48 28 56 30" fill="none" stroke="#ffb300" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <path d="M8 34 Q14 46 22 40 Q16 36 8 34" fill="none" stroke="#ff6f00" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <path d="M56 34 Q50 46 42 40 Q48 36 56 34" fill="none" stroke="#ff6f00" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
    <path d="M28 13 Q32 8 36 13 Q32 18 28 13" fill="#ff9100" opacity="0.7"/>
    <path d="M26 49 Q32 54 38 49 Q32 44 26 49" fill="#e65100" opacity="0.6"/>
  </g>

  <!-- embers & sparks -->
  <g filter="url(#glow-merge)">
    <circle cx="16" cy="17" r="0.75" fill="#fff176" opacity="0.85"/>
    <circle cx="50" cy="15" r="0.6" fill="#ffd54f" opacity="0.75"/>
    <circle cx="54" cy="47" r="0.65" fill="#ff9100" opacity="0.7"/>
    <circle cx="12" cy="44" r="0.55" fill="#ff6f00" opacity="0.65"/>
    <circle cx="32" cy="9" r="0.5" fill="#fff9c4" opacity="0.8"/>
    <circle cx="24" cy="12" r="0.35" fill="#ffb300" opacity="0.6"/>
    <circle cx="40" cy="11" r="0.4" fill="#ffb300" opacity="0.55"/>
  </g>
</svg>
