name: Sauron Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-win:
    name: Build and publish Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: OpenGuider-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OpenGuider-main/package-lock.json

      - name: Install OpenGuider dependencies
        shell: pwsh
        run: npm ci

      - name: Build gamedev-all-in-one MCP
        shell: pwsh
        run: |
          npm ci
          npm run build
        working-directory: OpenGuider-main/extensions/gamedev-all-in-one

      - name: Build bridge VSIX
        shell: pwsh
        run: |
          npm ci
          npm run package:vsix
        working-directory: sauron-vscode-bridge

      - name: Pre-dist checks
        shell: pwsh
        run: npm run predist:win

      - name: Build Windows installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sauron ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            OpenGuider-main/release/Sauron-*-win-x64.exe
