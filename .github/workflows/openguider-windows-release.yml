name: OpenGuider Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: OpenGuider-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OpenGuider-main/package-lock.json

      - name: Install dependencies
        shell: pwsh
        run: npm ci --omit=optional

      - name: Build gamedev-all-in-one MCP
        shell: pwsh
        run: |
          Set-Location extensions/gamedev-all-in-one
          npm ci
          npm run build
          if (-not (Test-Path dist/index.js)) { throw "gamedev-all-in-one dist/index.js missing" }

      - name: Pre-dist checks (skip unit tests on CI release)
        shell: pwsh
        env:
          SAURON_SKIP_DIST_TESTS: "1"
        run: node scripts/pre-dist-check.js

      - name: Build NSIS installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OpenGuider-main/release/Sauron-*-win-x64.exe
