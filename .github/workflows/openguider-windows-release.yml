name: OpenGuider Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and publish Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: OpenGuider-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OpenGuider-main/package-lock.json

      - name: Install dependencies
        shell: pwsh
        run: npm ci --omit=optional

      - name: Build NSIS installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OpenGuider-main/release/Sauron-*-win-x64.exe
